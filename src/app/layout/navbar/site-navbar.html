<header
	class="sticky top-0 z-50 border-b border-border/60 bg-background/80 backdrop-blur-xl transition-all duration-300">
	<div class="container-wide flex items-center justify-between gap-4 py-4 sm:py-5">
		<a href="#top" class="group flex items-center gap-3">
			<div
				class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-primary-foreground shadow-lg shadow-primary/30 group-hover:scale-105 transition-transform">
				<span class="font-display text-lg font-black italic">C&amp;C</span>
			</div>
			<div class="hidden flex-col leading-tight sm:flex">
				<span
					class="font-display text-xl font-black uppercase tracking-widest text-foreground group-hover:text-primary transition-colors">
					C&amp;C Landscaping
				</span>
				<span class="text-[10px] font-black uppercase tracking-widest text-muted-foreground/80">
					Hardscape LLC
				</span>
			</div>
		</a>

		<nav class="hidden items-center gap-10 lg:flex">
			@for (l of links; track l.href) {
			<a [href]="l.href"
				class="relative py-2 text-sm font-bold uppercase tracking-[0.15em] text-muted-foreground transition-colors hover:text-primary after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-0 after:bg-primary after:transition-all hover:after:w-full">
				{{ l.label }}
			</a>
			}
		</nav>

		<div class="flex items-center gap-4">
			<a href="tel:6024465194" class="btn-primary py-2.5 px-6 hidden sm:flex font-black">
				<fa-icon [icon]="faPhone" class="mr-3 text-sm"></fa-icon>
				602-446-5194
			</a>
			<button type="button" aria-label="Toggle menu"
				class="inline-flex h-12 w-12 items-center justify-center rounded-xl border border-border/60 bg-card/40 text-foreground transition-all hover:bg-card hover:border-primary/40 lg:hidden"
				(click)="toggleMenu()">
				@if (open) {
				<fa-icon [icon]="faTimes" class="text-xl"></fa-icon>
				} @else {
				<fa-icon [icon]="faBars" class="text-xl"></fa-icon>
				}
			</button>
		</div>
	</div>

	@if (open) {
	<div class="border-t border-border/60 bg-background/95 backdrop-blur-2xl lg:hidden animate-fade-in-down">
		<nav class="container-wide flex flex-col gap-2 py-6">
			@for (l of links; track l.href) {
			<a [href]="l.href" (click)="closeMenu()"
				class="rounded-xl px-4 py-3 text-sm font-bold uppercase tracking-widest text-muted-foreground transition-all hover:bg-primary/10 hover:text-primary">
				{{ l.label }}
			</a>
			}
			<a href="tel:6024465194" class="btn-primary mt-4 py-4 flex items-center justify-center gap-3">
				<fa-icon [icon]="faPhone" class="text-sm"></fa-icon>
				Call 602-446-5194
			</a>
		</nav>
	</div>
	}
</header>
