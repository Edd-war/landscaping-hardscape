<div
  aria-hidden="true"
  class="border-y border-primary/30 bg-primary py-3 text-primary-foreground"
>
  <div class="mx-auto flex max-w-7xl flex-wrap items-center justify-center gap-x-6 gap-y-1 px-4 sm:px-6 lg:px-8">
    @for (item of items; track item; let last = $last) {
      <span class="flex items-center gap-6 font-display text-sm font-bold uppercase tracking-widest">
        {{ item }}
        @if (!last) {
          <span class="h-1 w-1 rounded-full bg-primary-foreground/60"></span>
        }
      </span>
    }
  </div>
</div>
