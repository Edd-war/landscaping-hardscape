<section
  id="gallery"
  class="border-b border-border/60 bg-card/30 py-20 sm:py-28"
>
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex flex-col items-start justify-between gap-6 sm:flex-row sm:items-end">
      <div class="max-w-2xl">
        <p class="font-display text-sm font-semibold uppercase tracking-[0.25em] text-primary">
          Our Work
        </p>
        <h2 class="mt-3 font-display text-4xl font-bold uppercase tracking-tight text-foreground text-balance sm:text-5xl">
          Recent Projects
        </h2>
        <p class="mt-4 text-base leading-relaxed text-muted-foreground">
          A look at the yards we've transformed — every project is
          built with quality materials and an eye for detail.
        </p>
      </div>
      <a
        href="#contact"
        class="font-display text-sm font-bold uppercase tracking-widest text-primary underline-offset-4 hover:underline"
      >
        Start Your Project →
      </a>
    </div>

    <div class="mt-12 grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
      @for (p of projects; track p.src; let i = $index) {
        <figure
          class="group relative overflow-hidden rounded-xl border border-border bg-card"
          [class.lg:row-span-2]="i === 0"
          [class.lg:aspect-auto]="i === 0"
        >
          <div
            class="relative"
            [class.h-full]="i === 0"
            [class.min-h-[420px]]="i === 0"
            [class.aspect-[4/3]]="i !== 0"
          >
            <img
              [src]="p.src || '/placeholder.svg'"
              [alt]="p.title"
              class="object-cover w-full h-full transition-transform duration-500 group-hover:scale-105"
            />
            <div class="absolute inset-0 bg-gradient-to-t from-background/95 via-background/30 to-transparent"></div>
          </div>
          <figcaption class="absolute inset-x-0 bottom-0 flex items-end justify-between gap-3 p-5">
            <div>
              <span class="inline-block rounded-full border border-primary/40 bg-primary/15 px-2.5 py-0.5 text-[10px] font-semibold uppercase tracking-widest text-primary">
                {{ p.tag }}
              </span>
              <h3 class="mt-2 font-display text-lg font-bold uppercase tracking-wide text-foreground sm:text-xl">
                {{ p.title }}
              </h3>
            </div>
          </figcaption>
        </figure>
      }
    </div>
  </div>
</section>
