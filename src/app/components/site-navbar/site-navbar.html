<header class="sticky top-0 z-50 border-b border-border/60 bg-background/85 backdrop-blur-md">
  <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8">
    <a href="#top" class="flex items-center gap-2">
      <div class="flex h-10 w-10 items-center justify-center rounded-md bg-primary text-primary-foreground">
        <span class="font-display text-lg font-bold">C&amp;C</span>
      </div>
      <div class="hidden flex-col leading-tight sm:flex">
        <span class="font-display text-base font-bold uppercase tracking-wide text-foreground">
          C&amp;C Landscaping
        </span>
        <span class="text-xs uppercase tracking-widest text-muted-foreground">
          Hardscape LLC
        </span>
      </div>
    </a>

    <nav class="hidden items-center gap-8 lg:flex">
      @for (l of links; track l.href) {
        <a
          [href]="l.href"
          class="text-sm font-medium uppercase tracking-wide text-muted-foreground transition-colors hover:text-primary"
        >
          {{ l.label }}
        </a>
      }
    </nav>

    <div class="flex items-center gap-2">
      <a href="tel:6024465194">
        <p-button 
            severity="primary" 
            styleClass="hidden font-display text-base font-bold uppercase tracking-wide sm:inline-flex"
        >
            <i class="pi pi-phone mr-2 text-sm"></i>
            602-446-5194
        </p-button>
      </a>
      <button
        type="button"
        aria-label="Toggle menu"
        class="inline-flex h-10 w-10 items-center justify-center rounded-md border border-border text-foreground lg:hidden"
        (click)="toggleMenu()"
      >
        @if (open) {
          <i class="pi pi-times text-xl"></i>
        } @else {
          <i class="pi pi-bars text-xl"></i>
        }
      </button>
    </div>
  </div>

  @if (open) {
    <div class="border-t border-border/60 bg-background lg:hidden">
      <nav class="mx-auto flex max-w-7xl flex-col gap-1 px-4 py-3 sm:px-6">
        @for (l of links; track l.href) {
          <a
            [href]="l.href"
            (click)="closeMenu()"
            class="rounded-md px-3 py-2 text-sm font-medium uppercase tracking-wide text-muted-foreground hover:bg-secondary hover:text-primary"
          >
            {{ l.label }}
          </a>
        }
        <a
          href="tel:6024465194"
          class="mt-2 flex items-center justify-center gap-2 rounded-md bg-primary px-3 py-3 font-display text-base font-bold uppercase tracking-wide text-primary-foreground"
        >
          <i class="pi pi-phone text-sm"></i>
          Call 602-446-5194
        </a>
      </nav>
    </div>
  }
</header>
