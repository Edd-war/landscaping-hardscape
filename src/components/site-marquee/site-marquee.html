<div aria-hidden="true" class="relative overflow-hidden bg-primary py-3">
	<div class="container-wide relative">
		<div class="flex flex-wrap items-center justify-center gap-x-8 gap-y-2">
			@for (item of items; track item; let last = $last) {
			<span
				class="flex items-center gap-10 font-display text-sm font-black uppercase tracking-widest text-primary-foreground">
				{{ item }}
				@if (!last) {
				<span class="h-1.5 w-1.5 rounded-full bg-primary-foreground/30"></span>
				}
			</span>
			}
		</div>
	</div>
</div>
