<section id="gallery" class="border-b border-border/60 bg-card/10 section-padding overflow-hidden">
	<div class="container-wide">
		<div class="flex flex-col items-start justify-between gap-6 sm:flex-row sm:items-end animate-fade-in">
			<div class="max-w-2xl">
				<p class="font-display text-sm font-semibold uppercase tracking-[0.3em] text-primary">
					Our Work
				</p>
				<h2 class="mt-4 text-4xl sm:text-5xl">
					Recent Projects
				</h2>
				<p class="mt-4 text-base leading-relaxed text-muted-foreground sm:text-lg">
					A look at the yards we've transformed — every project is
					built with quality materials and an eye for detail.
				</p>
			</div>
			<a href="#contact" class="btn-outline py-2.5 px-6">
				Start Your Project →
			</a>
		</div>

		<div class="mt-12 grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
			@for (p of projects; track p.src; let i = $index) {
			<figure
				class="group relative overflow-hidden rounded-2xl border border-border/60 bg-card shadow-lg animate-fade-in-up"
				[style.animation-delay.ms]="i * 100" [class.lg:row-span-2]="i === 0" [class.lg:aspect-auto]="i === 0">
				<div class="relative" [class.h-full]="i === 0" [class.min-h-[450px]]="i === 0"
					[class.aspect-[4/3]]="i !== 0">
					<img [src]="p.src || '/placeholder.svg'" [alt]="p.title"
						class="object-cover w-full h-full transition-transform duration-1000 group-hover:scale-110" />
					<div
						class="absolute inset-0 bg-linear-to-b from-background/90 via-background/20 to-transparent transition-opacity group-hover:opacity-80">
					</div>
				</div>
				<figcaption
					class="absolute inset-x-0 top-0 p-6 -translate-y-2 transition-transform duration-500 group-hover:translate-y-0">
					<div class="glass-card border-white/10 bg-black/20 p-3">
						<span
							class="inline-block rounded-lg border border-primary/40 bg-primary/20 px-3 py-1 text-[10px] font-bold uppercase tracking-wider text-primary">
							{{ p.tag }}
						</span>
						<h3
							class="mt-3 font-display text-lg font-bold uppercase tracking-wide text-foreground sm:text-xl">
							{{ p.title }}
						</h3>
					</div>
				</figcaption>
			</figure>
			}
		</div>
	</div>
</section>
