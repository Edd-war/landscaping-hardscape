<section id="services" class="relative border-b border-border/60 section-padding overflow-hidden">
	<div class="grass-pattern absolute inset-0 -z-10 opacity-30"></div>
	<div class="container-wide">
		<div class="mx-auto max-w-2xl text-center animate-fade-in">
			<p class="font-display text-sm font-semibold uppercase tracking-[0.3em] text-primary">
				What We Do
			</p>
			<h2 class="mt-4 text-4xl sm:text-5xl">
				Full Service Landscaping &amp; Hardscape
			</h2>
			<p class="mt-6 text-base leading-relaxed text-muted-foreground sm:text-lg">
				From the ground up — we handle every aspect of your outdoor space
				with the same level of craftsmanship and care.
			</p>
		</div>

		<div class="mt-16 grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
			@for (s of services; track s.title) {
			<article
				class="group glass-card p-8 transition-all duration-500 hover:-translate-y-2 hover:border-primary/40 hover:shadow-2xl hover:shadow-primary/5">
				<div
					class="flex h-14 w-14 items-center justify-center rounded-xl bg-primary/10 text-primary ring-1 ring-primary/20 transition-all duration-500 group-hover:bg-primary group-hover:text-primary-foreground group-hover:rotate-6">
					<fa-icon [icon]="s.icon" class="text-2xl"></fa-icon>
				</div>
				<h3 class="mt-6 font-display text-xl font-bold uppercase tracking-wider text-foreground">
					{{ s.title }}
				</h3>
				<p
					class="mt-3 text-sm leading-relaxed text-muted-foreground group-hover:text-foreground/80 transition-colors">
					{{ s.description }}
				</p>
				<div aria-hidden="true"
					class="absolute bottom-0 left-0 h-1 w-0 bg-linear-to-r from-primary to-accent transition-all duration-500 group-hover:w-full">
				</div>
			</article>
			}
		</div>
	</div>
</section>
