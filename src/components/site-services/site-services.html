<section
  id="services"
  class="relative border-b border-border/60 py-20 sm:py-28"
>
  <div class="grass-pattern absolute inset-0 -z-10 opacity-60"></div>
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="mx-auto max-w-2xl text-center">
      <p class="font-display text-sm font-semibold uppercase tracking-[0.25em] text-primary">
        What We Do
      </p>
      <h2 class="mt-3 font-display text-4xl font-bold uppercase tracking-tight text-foreground text-balance sm:text-5xl">
        Full Service Landscaping &amp; Hardscape
      </h2>
      <p class="mt-4 text-base leading-relaxed text-muted-foreground">
        From the ground up — we handle every aspect of your outdoor space
        with the same level of craftsmanship and care.
      </p>
    </div>

    <div class="mt-14 grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
      @for (s of services; track s.title) {
        <article
          class="group relative flex flex-col overflow-hidden rounded-xl border border-border bg-card p-6 transition-all hover:-translate-y-1 hover:border-primary/60 hover:shadow-[0_0_0_1px_var(--primary)]"
        >
          <div class="flex h-12 w-12 items-center justify-center rounded-lg bg-primary/15 text-primary ring-1 ring-primary/30 transition-colors group-hover:bg-primary group-hover:text-primary-foreground">
            <i [class]="s.iconClass" class="text-xl"></i>
          </div>
          <h3 class="mt-5 font-display text-xl font-bold uppercase tracking-wide text-foreground">
            {{ s.title }}
          </h3>
          <p class="mt-2 text-sm leading-relaxed text-muted-foreground">
            {{ s.description }}
          </p>
          <div
            aria-hidden="true"
            class="absolute -bottom-px left-0 h-px w-0 bg-primary transition-all duration-500 group-hover:w-full"
          ></div>
        </article>
      }
    </div>
  </div>
</section>
